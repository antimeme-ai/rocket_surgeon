[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    # Required by target-lexicon (pulled in transitively via pyo3-build-config).
    # The LLVM exception only relaxes the patent-grant requirement for certain
    # downstream uses; we accept it because we're not redistributing Rust
    # toolchain artifacts.
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

[advisories]
version = 2

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
