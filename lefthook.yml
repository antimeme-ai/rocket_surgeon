# lefthook — git hook manager
# https://lefthook.dev/
#
# Installed by `cargo xtask setup`. Python commands call .venv/bin/* directly
# so the hooks work whether or not the venv is activated in the shell that
# runs `git commit` / `git push`.

pre-commit:
  parallel: true
  commands:
    python-version-guard:
      run: |
        PIN=$(tr -d '[:space:]' < .python-version)
        ACTUAL=$(.venv/bin/python -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")' 2>/dev/null || echo unknown)
        if [ "$ACTUAL" != "$PIN" ]; then
          echo "venv python is $ACTUAL but .python-version pins $PIN" >&2
          echo "run 'cargo xtask setup' to rebuild the venv" >&2
          exit 1
        fi
    rust-fmt:
      glob: "*.rs"
      run: cargo fmt --all -- --check
    rust-clippy:
      glob: "*.rs"
      # PATH override: cargo clippy --all-targets triggers PyO3 build scripts
      # which probe `python3` on PATH. Force the venv so we hit the pinned
      # interpreter regardless of whether the shell that ran git is activated.
      run: PATH="$PWD/.venv/bin:$PATH" cargo clippy --workspace --all-targets -- -D warnings
    python-ruff-check:
      glob: "{python,tests}/**/*.py"
      run: .venv/bin/ruff check python/ tests/
    python-ruff-format:
      glob: "{python,tests}/**/*.py"
      run: .venv/bin/ruff format --check python/ tests/
    python-mypy:
      glob: "python/**/*.py"
      run: .venv/bin/mypy python/rocket_surgeon

pre-push:
  # Lightened pre-push: unit tests only, no e2e. The full e2e suite (esp.
  # tests/test_e2e_phase1.py with real GPT-2 124M) used to gate every push
  # and added ~15-20 min of wall-clock locally. It also broke on parallel
  # pushes — cargo's target lock and /dev/shm contention serialized the
  # shared-build steps and thrashed PyO3 feature unification.
  #
  # E2E now lives exclusively in CI, sharded into `e2e-fast` and
  # `e2e-phase1` jobs that run in parallel with lint and unit tests (see
  # .github/workflows/ci.yml). If you want the full local gate before
  # pushing, run `cargo xtask ci` by hand — that subcommand is unchanged.
  #
  # piped, not parallel: both commands invoke cargo build steps and
  # serialize on the target/ build lock anyway. Sequential = fail fast.
  piped: true
  commands:
    cargo-test:
      run: PATH="$PWD/.venv/bin:$PATH" cargo xtask test
    pytest:
      run: .venv/bin/pytest python/tests/
